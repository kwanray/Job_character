  <path d="M122 81Q140 76Q158 84" stroke="#504838" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Inner brow shadow for depth -->
  <path d="M42 84Q60 80Q78 84" stroke="#302820" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M122 84Q140 80Q158 84" stroke="#302820" stroke-width="2" fill="none" opacity="0.5"/>

