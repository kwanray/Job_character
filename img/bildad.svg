  <ellipse cx="66" cy="100" rx="18" ry="18" fill="#eee8dc"/>
  <ellipse cx="66" cy="98" rx="12.5" ry="13" fill="#4a3828"/>
  <circle cx="66" cy="98" r="8.5" fill="#18100a"/>
  <circle cx="71" cy="93" r="3" fill="white"/>
  <circle cx="63" cy="104" r="1.3" fill="white" opacity="0.4"/>
  <path d="M48 99Q66 89Q84 99" stroke="#302820" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M49 102Q66 112Q83 102" stroke="#907858" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50 98Q47 93" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M60 92Q58 87" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M66 90Q66 85" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M73 92Q75 87" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M82 98Q85 93" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>

