  <!-- Mouth — firm, set line -->
  <path d="M78 142Q100 139Q122 142" stroke="#7a5030" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Neat grey beard — well-groomed, shorter than Eliphaz -->
  <path d="M20 128Q18 150Q22 170Q36 192Q62 208Q100 214Q138 208Q164 192Q178 170Q182 150Q180 128Q166 144Q148 154Q126 160Q100 162Q74 160Q52 154Q34 144Q20 128Z" fill="#888070"/>
  <path d="M52 146Q48 168Q52 186" stroke="#707060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M100 156Q100 178Q100 196" stroke="#707060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 146Q152 168Q148 186" stroke="#707060" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Scroll hint at lower edge -->
  <ellipse cx="162" cy="200" rx="10" ry="18" fill="#d4b870" opacity="0.5"/>
  <line x1="155" y1="188" x2="169" y2="188" stroke="#c09860" stroke-width="1.5" opacity="0.5"/>
</svg>
