  <ellipse cx="19" cy="110" rx="12" ry="16" fill="#a86838"/>
  <ellipse cx="181" cy="110" rx="12" ry="16" fill="#a86838"/>

  <!-- Face — strong, authoritative -->
  <ellipse cx="100" cy="112" rx="82" ry="88" fill="url(#face)"/>
  <!-- Firm jaw shadow -->
  <ellipse cx="100" cy="148" rx="60" ry="25" fill="#905028" opacity="0.2"/>

