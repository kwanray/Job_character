<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e1408"/>
      <stop offset="100%" stop-color="#080602"/>
    </radialGradient>
    <radialGradient id="face" cx="42%" cy="36%" r="58%">
      <stop offset="0%" stop-color="#c48858"/>
      <stop offset="70%" stop-color="#b47848"/>
      <stop offset="100%" stop-color="#906030"/>
    </radialGradient>
  </defs>
  <rect width="200" height="220" fill="url(#bg)"/>

  <!-- Formal terracotta robe with gold detail -->
  <path d="M0 220L0 186Q30 172 100 176Q170 172 200 186L200 220Z" fill="#8b5e2a"/>
