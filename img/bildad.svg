  <ellipse cx="134" cy="100" rx="18" ry="18" fill="#eee8dc"/>
  <ellipse cx="134" cy="98" rx="12.5" ry="13" fill="#4a3828"/>
  <circle cx="134" cy="98" r="8.5" fill="#18100a"/>
  <circle cx="139" cy="93" r="3" fill="white"/>
  <circle cx="131" cy="104" r="1.3" fill="white" opacity="0.4"/>
