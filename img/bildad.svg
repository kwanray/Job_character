  <path d="M117 102Q134 112Q151 102" stroke="#907858" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M118 98Q115 93" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M127 92Q125 87" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M134 90Q134 85" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M141 92Q143 87" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M150 98Q153 93" stroke="#302820" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Nose — solid, prominent -->
