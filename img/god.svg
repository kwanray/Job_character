<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#1e1608"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#fff6c0"/>
      <stop offset="38%" stop-color="#fce880"/>
      <stop offset="62%" stop-color="#f0a820"/>
      <stop offset="82%" stop-color="#c07010" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f0a820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd060" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#f09020" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#c06000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="220" fill="url(#bg)"/>

  <!-- Full-canvas atmospheric glow -->
  <circle cx="100" cy="102" r="110" fill="url(#aura)" opacity="0.6"/>

  <!-- Whirlwind rings — many tilted ellipses, filling most of the canvas -->
  <ellipse cx="100" cy="102" rx="96" ry="34" fill="none" stroke="#7a5010" stroke-width="1" opacity="0.20" transform="rotate(-32 100 102)"/>
  <ellipse cx="100" cy="102" rx="90" ry="30" fill="none" stroke="#8a6018" stroke-width="1" opacity="0.24" transform="rotate(15 100 102)"/>
  <ellipse cx="100" cy="102" rx="82" ry="28" fill="none" stroke="#9a7020" stroke-width="1.2" opacity="0.30" transform="rotate(-44 100 102)"/>
  <ellipse cx="100" cy="102" rx="74" ry="25" fill="none" stroke="#aa8028" stroke-width="1.2" opacity="0.36" transform="rotate(28 100 102)"/>
  <ellipse cx="100" cy="102" rx="66" ry="22" fill="none" stroke="#c09030" stroke-width="1.4" opacity="0.42" transform="rotate(-18 100 102)"/>
  <ellipse cx="100" cy="102" rx="58" ry="20" fill="none" stroke="#d0a038" stroke-width="1.6" opacity="0.50" transform="rotate(35 100 102)"/>
  <ellipse cx="100" cy="102" rx="50" ry="17" fill="none" stroke="#e0b040" stroke-width="1.8" opacity="0.58" transform="rotate(-8 100 102)"/>
  <ellipse cx="100" cy="102" rx="42" ry="15" fill="none" stroke="#ecbf50" stroke-width="2.0" transform="rotate(22 100 102)" opacity="0.68"/>
  <ellipse cx="100" cy="102" rx="34" ry="12" fill="none" stroke="#f8cf60" stroke-width="2.2" transform="rotate(-15 100 102)" opacity="0.78"/>

  <!-- Central radiant orb — MUCH LARGER than before -->
  <circle cx="100" cy="102" r="58" fill="url(#core)" opacity="0.42"/>
  <circle cx="100" cy="102" r="46" fill="#f8e070" opacity="0.55"/>
  <circle cx="100" cy="102" r="36" fill="#fce888" opacity="0.68"/>
  <circle cx="100" cy="102" r="26" fill="#fff0a0" opacity="0.82"/>
  <circle cx="100" cy="102" r="17" fill="#fff8c0" opacity="0.92"/>
  <circle cx="100" cy="102" r="9"  fill="white"/>

  <!-- Radiating light shafts — 12 directions reaching canvas edges -->
  <line x1="100" y1="93"  x2="100" y2="2"   stroke="white" stroke-width="1.5" opacity="0.52"/>
  <line x1="100" y1="111" x2="100" y2="218"  stroke="white" stroke-width="1.5" opacity="0.52"/>
  <line x1="91"  y1="102" x2="2"   y2="102"  stroke="white" stroke-width="1.5" opacity="0.52"/>
  <line x1="109" y1="102" x2="198" y2="102"  stroke="white" stroke-width="1.5" opacity="0.52"/>
  <!-- Diagonal rays -->
  <line x1="94"  y1="96"  x2="26"  y2="26"   stroke="white" stroke-width="1.1" opacity="0.36"/>
  <line x1="106" y1="96"  x2="174" y2="26"   stroke="white" stroke-width="1.1" opacity="0.36"/>
  <line x1="94"  y1="108" x2="26"  y2="178"  stroke="white" stroke-width="1.1" opacity="0.36"/>
  <line x1="106" y1="108" x2="174" y2="178"  stroke="white" stroke-width="1.1" opacity="0.36"/>
  <!-- Shallower angle rays -->
  <line x1="95"  y1="93"  x2="60"  y2="6"    stroke="white" stroke-width="0.8" opacity="0.24"/>
  <line x1="105" y1="93"  x2="140" y2="6"    stroke="white" stroke-width="0.8" opacity="0.24"/>
  <line x1="109" y1="96"  x2="196" y2="60"   stroke="white" stroke-width="0.8" opacity="0.24"/>
  <line x1="109" y1="108" x2="196" y2="144"  stroke="white" stroke-width="0.8" opacity="0.24"/>

  <!-- Scripture text at base -->
  <text x="100" y="196" text-anchor="middle" font-size="8.5" fill="#c88820" opacity="0.70" font-family="Georgia, serif" font-style="italic">from the whirlwind</text>
  <text x="100" y="212" text-anchor="middle" font-size="7.5" fill="#c88820" opacity="0.50" font-family="Georgia, serif" font-style="italic">— Job 38:1</text>
</svg>
