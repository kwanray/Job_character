  <path d="M48 110Q46 122Q48 134" stroke="#c8ddf0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M152 110Q154 122Q152 134" stroke="#c8ddf0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.65"/>
