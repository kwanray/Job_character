  <path d="M100 158Q100 178Q100 196" stroke="#2e1c10" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M146 150Q150 170Q144 188" stroke="#2e1c10" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M76 154Q74 174Q78 190" stroke="#281808" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M124 154Q126 174Q122 190" stroke="#281808" stroke-width="1.5" fill="none" stroke-linecap="round"/>

